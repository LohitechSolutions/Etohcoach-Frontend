// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "30.0.2"
        minSdkVersion = 29
        compileSdkVersion = 34
        targetSdkVersion = 34
        supportLibVersion = "29.0.2"
        androidXAnnotation = "1.1.0"
        androidXBrowser = "1.0.0"
        kotlinVersion = "1.6.21"
        multiDexEnabled = true
        googlePlayServicesAuthVersion = "19.2.0"
        ndkVersion = "21.4.7075529"
        // googlePlayServicesVersion = "+" // default: "+"
        // firebaseMessagingVersion = "20.2.1"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {

        // Add the following line:
        classpath 'com.google.gms:google-services:4.3.10'  // Google Services plugin
        // classpath 'com.google.firebase:firebase-messaging:20.2.1'
        // classpath 'com.google.gms:google-services:4.1.0'  // Google Services plugin

        classpath 'com.android.tools.build:gradle:7.1.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}
def REACT_NATIVE_VERSION = new File(['node', '--print',"JSON.parse(require('fs').readFileSync(require.resolve('react-native/package.json'), 'utf-8')).version"].execute(null, rootDir).text.trim())
// def REACT_NATIVE_VERSION = "0.61.3" //replace this with the latest stable version you were using before
subprojects {
    afterEvaluate {
        project ->
            if (project.hasProperty("android")) {
                android {
                    compileSdkVersion = 34
                    buildToolsVersion = "30.0.2"
                }
            }
    }
    
}


allprojects {
    repositories {
        maven { url "https://jitpack.io" }
        mavenLocal()
        configurations.all {
            resolutionStrategy {
                force "com.facebook.soloader:soloader:0.8.2"
                force "com.facebook.react:react-native:" + REACT_NATIVE_VERSION
            }
        }
        jcenter() {
            content {
                includeModule("com.yqritc", "android-scalablevideoview")
            }
        }
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../../../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            // url("$rootDir/../node_modules/jsc-android/dist")
            url("$rootDir/../../../node_modules/jsc-android/dist")
        }
        maven { url 'https://maven.google.com' }
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
     configurations.all {
        resolutionStrategy {
            // Remove this override in 0.66, as a proper fix is included in react-native itself.
            force "com.facebook.react:react-native:" + REACT_NATIVE_VERSION
            force "com.facebook.soloader:soloader:0.9.0"
        }
}
    }